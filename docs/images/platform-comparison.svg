<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Same pipeline across four CI/CD platforms</title>
<desc>A diagram showing one shared pipeline (checkout, install, lint, test, build, deploy) at the top, with arrows fanning down to four boxes representing GitHub Actions, GitLab CI, Jenkins, and CircleCI, each showing where its config file lives.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g>
<rect x="90" y="20" width="500" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="40" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Same pipeline logic</text>
<text x="340" y="60" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">checkout, install, lint, test, build, deploy</text>
</g>

<line x1="200" y1="76" x2="120" y2="130" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="300" y1="76" x2="270" y2="130" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="380" y1="76" x2="410" y2="130" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="480" y1="76" x2="560" y2="130" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="40" y="140" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="120" y="160" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">GitHub Actions</text>
<text x="120" y="180" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">.github/workflows/*.yml</text>
</g>

<g>
<rect x="210" y="140" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="290" y="160" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">GitLab CI</text>
<text x="290" y="180" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">.gitlab-ci.yml</text>
</g>

<g>
<rect x="380" y="140" width="140" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="450" y="160" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#412402">Jenkins</text>
<text x="450" y="180" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#633806">Jenkinsfile (Groovy)</text>
</g>

<g>
<rect x="540" y="140" width="100" height="56" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="590" y="160" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4B1528">CircleCI</text>
<text x="590" y="180" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#72243E">config.yml</text>
</g>

<text x="340" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Different syntax, different config location — same underlying idea</text>
</svg>
