<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>CI/CD pipeline flow</title>
<desc>A horizontal flowchart showing code being pushed, then flowing through CI stages (checkout, install, lint, test), then a pass/fail branch, then CD stages (build artifact, push to registry, deploy).</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g>
<rect x="40" y="20" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="105" y="42" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Developer</text>
</g>

<g>
<rect x="40" y="100" width="600" height="100" rx="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="60" y="124" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">CI: continuous integration</text>
</g>
<g>
<rect x="60" y="140" width="110" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="115" y="162" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Checkout</text>
</g>
<g>
<rect x="195" y="140" width="110" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="250" y="162" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Install deps</text>
</g>
<g>
<rect x="330" y="140" width="110" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="385" y="162" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Lint</text>
</g>
<g>
<rect x="465" y="140" width="110" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="520" y="162" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Test</text>
</g>

<line x1="170" y1="162" x2="193" y2="162" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="305" y1="162" x2="328" y2="162" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="440" y1="162" x2="463" y2="162" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="105" y1="64" x2="105" y2="138" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="40" y="240" width="600" height="60" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="60" y="264" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">CD: continuous delivery / deployment</text>
</g>

<text x="290" y="282" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#04342C">build → push image → deploy to staging/production</text>

<line x1="520" y1="184" x2="520" y2="220" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="540" y="210" font-family="sans-serif" font-size="12" fill="#5F5E5A">all pass</text>
</svg>
